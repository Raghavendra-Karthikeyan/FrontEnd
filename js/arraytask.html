<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let  i;
        //1) Write a JavaScript program to print all elements of an array using a loop.
        var a = [1, 2, 3, 4, 5];
        for(i = 0; i < a.length; i++){
            console.log(a[i]);
        }

        //2)Write a JavaScript program to print only the even numbers from an array.
        var b = [10, 12, 23, 14, 25, 36];
        for(i = 0; i < b.length; i++){
            if(b[i] % 2 == 0){
                console.log(b[i]);
            }
        }

        //3)Write a JavaScript program to print only the odd numbers from an array.
        var c = [10, 12, 23, 14, 25, 36];
        for(i = 0; i < c.length; i++){  
            if(c[i] % 2 != 0){
                console.log(c[i]);
            }
        }

        //4)Write a JavaScript program to find the sum of all numbers in an array.
        var d = [9, 32, 23, 44, 56];
        var sum = 0;
        for(i = 0; i < d.length; i++){
            sum += d[i];
        }
        console.log(sum);

        //5)Write a JavaScript program to find the largest number in an array using a loop.
        var e = [9, 32, 23, 44, 56];
        var largest = 0;
        for(i = 0; i < e.length; i++){
            if(e[i] > largest){
                largest = e[i];
            }
        }
        console.log(largest);

        //6)Write a JavaScript program to find the smallest number in an array using a loop.
        var f = [9, 32, 23, 44, 56];
        var smallest = 0;
        for(i = 0; i < f.length; i++){
            if(f[i] < smallest){
                smallest = f[i];
            }
        }
        console.log(smallest);


        var ar1 = [9, -32, 23, -44, 56, 70, 85];

        //7)Write a JavaScript program to count how many positive numbers are in an array.
        var count = 0;
        for(i = 0; i < ar1.length; i++){
            if(ar1[i] > 0){
                count++;
            }
        }
        console.log("positive numbers: " + count);

        //8)Write a JavaScript program to count how many negative numbers are in an array.
        var count1 = 0;
        for(i = 0; i < ar1.length; i++){    
            if(ar1[i] < 0){
                count1++;
            }
        }
        console.log("negative numbers: " + count1);

        //9)Write a JavaScript program to reverse an array without using the .reverse() method.
        var reversed = "";
        for(i = ar1.length - 1; i >= 0; i--){
            reversed += ar1[i] + " ";
        }
        console.log(reversed);

        //10)Write a JavaScript program to count how many even and odd numbers are present in an array.
        var countEven = 0;
        var countOdd = 0;   
        for(i = 0; i < ar1.length; i++){
            if(ar1[i] % 2 == 0){
                countEven++;
            } else {
                countOdd++;
            }
        }
        console.log("even numbers: " + countEven);
        console.log("odd numbers: " + countOdd);
        
        //11)Write a JavaScript program to find and print the index of a specific value in an array.
        var value = 23;
        var index = -1;
        for(i = 0; i < ar1.length; i++){
            if(ar1[i] == value){
                index = i;
            }
        }
        console.log("index of " + value + ": " + index);

        //12)Write a JavaScript program to replace all negative numbers in an array with 0.
        for(i = 0; i < ar1.length; i++){
            if(ar1[i] < 0){
                ar1[i] = 0;
            }
        }
        console.log("Array after replacing negative numbers with 0: " + ar1);

        //13)Write a JavaScript program to print all numbers greater than 50 from an array.
        for(i = 0; i < ar1.length; i++){    
            if(ar1[i] > 50){
                console.log(ar1[i]);
            }
        }

        //14)Write a JavaScript program to create a new array containing the squares of each element.
        var squares = [];
        for(i = 0; i < ar1.length; i++){
            squares.push(ar1[i] * ar1[i]);
        }
        console.log("Squares of each element: " + squares);

        //15)Write a JavaScript program to print all duplicate values in an array.
         let values=[2,4,4,6,7,8,2];
        for(let i=0;i<values.length;i++){
            for(let j=i+1;j<values.length;j++){
                if(values[i]==values[j]){
                     console.log(values[i]);    
                } 
            }

        }
        
        //16)Write a JavaScript program to print array elements until the number 50 appears (stop when found).
        for(i = 0; i < ar1.length; i++){
            if(ar1[i] == 50){
                break;
            }
            console.log(ar1[i]);
        }

        //17)Write a JavaScript program to count how many numbers in an array are divisible by 5.
        let divcount = 0;
        for (let i = 0; i < ar1.length; i++) {
            if (ar1[i] % 5 == 0) {
                divcount = divcount + 1;
            }
        }
        console.log("count of numbers divisible by 5 is "+ divcount);


        //18)Write a JavaScript program to find the second largest number in an array using loops.
        let firstlargest = 0;
        let secondlargest = 0;
        for (let i = 0; i < ar1.length; i++) {
            if (ar1[i] > firstlargest) {
                secondlargest = firstlargest;
            
                firstlargest = ar1[i];
                    
            }
            else if (ar1[i] > secondlargest && ar1[i] != firstlargest) {
                secondlargest = ar1[i];
            }

        }
        console.log("Second largest in the Array is "+secondlargest);

        //19)Write a JavaScript program to check whether an array is sorted in ascending order.
        let isSorted = true;
        for (let i = 0; i < ar1.length - 1; i++) {
            if (ar1[i] > ar1[i + 1]) {
                isSorted = false;
                break;
            }
        }
        console.log("Is the array sorted in ascending order? " + isSorted); 

        //20)Write a JavaScript program to find the sum of only the even numbers in an array.
        let evenSum = 0;
        for (let i = 0; i < ar1.length; i++) {
            if (ar1[i] % 2 == 0) {
                evenSum += ar1[i];
            }
        }
        console.log("Sum of even numbers: " + evenSum);


    </script>
</body>
</html>
