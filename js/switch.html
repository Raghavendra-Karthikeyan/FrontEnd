    <script>
        // Switch 
        // 1) Write a JavaScript program to check whether a number is even or odd using a switch statement.
        var num = parseInt(prompt("enter the number:"))
        switch (true) {
            case (num % 2 === 0):
                console.log("even num")
                break
            case (num % 2 != 0):
                console.log("odd num")
                break
        }

        // 2) Write a JavaScript program to check whether a number is positive, negative, or zero using a switch statement. 
        let numb = parseInt(prompt("enter the number:"))
        switch (true) {
            case (numb > 0):
                console.log("positive number");
                break

            case (numb === 0):
                console.log(" number is zero");
                break

            case (numb < 0):
                console.log("negative number");
                break
        }

        // 3) Create a simple calculator in JavaScript that performs addition, subtraction, multiplication, or division based on user input using switch.
        let num1 = parseInt(prompt("enter the number1:"))
        let num2 = parseInt(prompt("enter the number2:"))
        let choice = prompt("Enter ur choice:1.addition 2.subtraction 3.multiplication 4.division")
        switch (choice) {
            case "addition":
                console.log(num1 + num2);
                break


            case "subtraction ":
                console.log(num1 - num2);
                break


            case "multiplication":
                console.log(num1 * num2);
                break

            case "division":
                console.log(num1 / num2);
                break

            default:
                console.log("enter the valid option");

        }

        // 4)Write a JavaScript program to check whether a given day is a weekday or weekend using switch.
        let number = prompt("Enter the day:")
        switch (number) {
            case 1:

            case 3:
            case 4:
            case 5:
                console.log("weekday");

            case 6:
            case 7:

        }

        // 5)Write a JavaScript program to implement a grading system based on marks (A, B, C, D, Fail) using switch.
        let mark = parseInt(prompt("enter the mark:"))
        switch (mark) {
            case (mark === 100):
                console.log("O grade");
                break
            case (mark >= 90):
                console.log("A grade");
                break
            case (mark >= 80):
                console.log("B grade");
                break
            case (mark >= 70):
                console.log("C grade");
                break
            case (mark >= 35):
                console.log("D grade");
                break
            case (mark < 35):
                console.log("fail");
                break

        }

        // 7)Write a JavaScript program to check whether a character is a vowel or consonant using switch.
        let char = prompt("Enter a character")

            case "a":
            case "e":
            case "i":
            case "o":

                console.log("vowel");

        // 8)Write a JavaScript program to print an action based on a traffic signal color (Red, Yellow, Green) using switch.

        // 9)Write a JavaScript program to check whether a given year is a leap year using switch.
        let year = parseInt(prompt("enter the year:"))
        switch (year) {
            case (year % 4 === 0):
                console.log("leap year");
                break
            case (year % 4 != 0):
                console.log("leap year");
                break

        }

        // 10)Write a JavaScript program to categorize a person based on age group (Child, Teen, Adult, Senior) using switch.
        let age = parseInt(prompt("enter the age:"))
        switch (true) {
            case (age >= 0 || age < 13):
                console.log("child");
                break
            case (age >= 13 || age < 19):
                console.log("Teenager");
                break
            case (age >= 20 || age < 59):
                console.log("Adult");
                break

            case (age >= 60):
                console.log("senior citizen");
                break
            default:
                console.log("Enter the valid age");

        }

        //  14)Write a JavaScript program cto chek whether a number is divisible by both 3 and 5 using switch.

        //  15)Write a JavaScript program to classify a number as Positive Even, Positive Odd, Zero, or Negative using switch.
        let noevenodd = prompt("Enter the number to classify a number as Positive Even, Positive Odd, Zero, or Negative")
        switch (true) {
