<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js.variable</title>

</head>
<body>
    
    <script>

        //primitive
        var name = "Raghav"
        console.log(name);
        console.log(typeof name);

        let regno ;
        regno = 24182;
        console.log(regno , typeof regno);

        const bln = false;
        console.log(typeof bln);

        let n = null;
        console.log(typeof n, n);

        let address
        console.log(typeof address);


        //non-primitive
        const details = {
            name : "Raghav" ,
            age : 19,
            adress : "Puducherry",

        }
        console.log(typeof details, details);


        var place = ["puducherry","chennai","mumbai"];
        console.log(typeof place, place);

        var myData =  function myFun(){

        }

        console.log(typeof myData);

    </script>

</body>
</html>
