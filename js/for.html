    <script>

        //1. Write a program to print numbers from 1 to 10 using a for loop.
        for (let i = 1; i <= 10; i++) {
            console.log(i);

        }

        // 2. Write a program to print even numbers from 1 to 20 using a for loop.
        for (let i = 1; i <= 20; i++) {
            if (i % 2 === 0) {
                console.log(i);
            }

        }

        // 3. Write a program to print odd numbers from 1 to 20 using a for loop.
        for (let i = 1; i <= 20; i++) {
            if (i % 2 != 0) {
                console.log(i);
            }

        }

        // 4. Write a program to print numbers from 10 to 1 in reverse order.
        for (let i = 10; i >= 1; i--) {
            console.log(i);

        }

        // 5. Write a program to print the square of each number from 1 to 10.
        for (let i = 1; i <= 10; i++) {

        }

        for (let i = 5; i <= 50; i++) {

            }
        }

        let sum = 0;
        for (let i = 1; i <= 10; i++) {
            sum = sum + i;
        }
        console.log(sum);

        // 8. Write a program to find the sum of even numbers from 1 to 20.
        let sumOfEven = 0;
        for (let i = 1; i <= 20; i++) {
            if (i % 2 === 0) {
                sumOfEven = sumOfEven + i;
            }

        }
        console.log(sumOfEven);

        // 9. Write a program to find the sum of odd numbers from 1 to 20.
        let sumOfOdd = 0;
        for (let i = 1; i <= 20; i++) {
            if (i % 2 != 0) {
                sumOfOdd = sumOfOdd + i;
            }

        }

        for (let i = 1; i <= 10; i++) {
            y = 7 * i;
            console.log("7" + "*" + i + "=" + y);
        }

        // 11. Write a program to print numbers divisible by 3 from 1 to 30.
        for (let i = 1; i <= 30; i++) {
            if (i % 3 === 0) {
                console.log(i);
            }
        }

        // 12. Write a program to find the factorial of 5 using a for loop.
        let fact = 1;
        for (let i = 5; i >= 1; i--) {
            fact = fact * i;


        }

        for (let i = 1; i <= 15; i++) {
            {
                console.log(i);

        }

        // 14. Write a program to count the digits of a number (example: 54321).
        let number = 4567;
        let count = 0
        while (number > 0) {
            let rem = number % 10;
            if (rem < 10) {
                count = count + 1;
            }
            number = Math.floor(number / 10);

        }
        console.log(count);

        // 15. Write a program to reverse a number using a for loop (example: 1234 → 4321).
        let num = 834;
        let result = 0;
        while (num > 0) {

            let remainder = num % 10;
            result = (result * 10) + remainder;
            num = Math.floor(num / 10);
        }
        console.log("The reversed Number is" + result);
       
        // 17. Write a program to find the sum of digits of a number (example: 564 → 15).
        let value = 345;
        let r = 0;
        let sumValue = 0
        while (value > 0) {
            r = value % 10;
            sumValue = sumValue + r;
            value = Math.floor(value / 10);

        }
        console.log(sumValue);

        // 18. Write a program to calculate power of a number using loops (example: 2⁵).
        let baseValue = 3
        let power = 4
        let resultOfPower = 1;
        for (let i = 1; i <= power; i++) {
            resultOfPower = resultOfPower * baseValue

        }
        console.log(resultOfPower);

        // 19. Write a program to check if a number is prime or not using a for loop.
        let no = 26;
        let isPrime = true;

        for (let i = 2; i * i <= no; i++) {
            if (no % i === 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime && no > 1) {
            console.log("Prime");
        } else {
            console.log("Not Prime");
        }

        // 20. Write a program to print a right-triangle star pattern using a for loop.
        n = 5;

        for (let i = 1; i <= n; i++) {
            let row = "";

            for (let j = 1; j <= i; j++) {
                row += "*";
            }
            console.log(row);
        }
