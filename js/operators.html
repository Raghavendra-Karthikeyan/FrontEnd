<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        let a = 10;
        let b = 20;
        let d = 5;
        let c = 15;
        let e = 25;
        //Arithmetic
        console.log(a+b);
        console.log(a-b);
        console.log(a*b);
        console.log(a/b);
        console.log(10%3);
        console.log(a**2);

        // post and pre incre nd decre
        let t = 4;
        console.log(++t);
        console.log(t++);
        console.log(--t);
        console.log(t--);
        
        //Assignment 
        console.log(a+=5);
        console.log(b-=3);
        console.log(c*=2);
        console.log(d/=2);
        console.log(e%=2);
        
        //comparison
        let x = 12 , y = 18;
        console.log(x==y);
        console.log(x!=y);
        console.log(x>y);
        console.log(x>=y);
        console.log(x<y);
        console.log(x<=y);
        //strictly
         console.log(x===y);
         console.log(x!==y);

         //logical
        let r = 10 , p = 20;
        console.log(r<=10 && p>=20);
        console.log(r==10 || p==20);
        console.log(!(r<=10)|| (p>=20));
        
    </script>
</body>
</html>
