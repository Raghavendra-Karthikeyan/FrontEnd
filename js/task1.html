<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CRUD Operation</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        /* BUTTON */
        .open-btn {
            padding: 10px 15px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .open-btn:hover {
            background: #7d3c98;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        /* MODAL CONTENT */
        .modal-content {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            position: relative;
        }

        .modal-content h2 {
            text-align: center;
        }

        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .modal-content button {
            width: 95%;
            padding: 10px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .modal-content button:hover {
            background: #7d3c98;
        }

        .close {
            position: absolute;
            right: 12px;
            top: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        /* TABLE */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #9b59b6;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .action-btns {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .edit-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <button class="open-btn" onclick="openModal()">Add User</button>

    <!-- MODAL -->
    <div class="modal" id="modal">

        <div class="modal-content">

            <span class="close" onclick="closeModal()">&times;</span>

            <h2>User Form</h2>

            <input type="text" id="name" placeholder="Enter Name">

            <input type="email" id="email" placeholder="Enter Email">

            <input type="text" id="mobile" placeholder="Enter Mobile">

            <button onclick="addData()">Save</button>

        </div>

    </div>

    <!-- TABLE -->
    <table>

        <thead>

            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    <script>

        let users = JSON.parse(localStorage.getItem("users")) || [];

        let editIndex = -1;

        // OPEN MODAL
        function openModal() {
            document.getElementById("modal").style.display = "flex";
        }

        // CLOSE MODAL
        function closeModal() {
            document.getElementById("modal").style.display = "none";

            clearForm();

            editIndex = -1;
        }

        // ADD / UPDATE DATA
        function addData() {

            let name = document.getElementById("name").value;

            let email = document.getElementById("email").value;

            let mobile = document.getElementById("mobile").value;

            if (!name || !email || !mobile) {
                alert("Please fill all fields");
                return;
            }

            let user = {
                name,
                email,
                mobile
            };

            // UPDATE
            if (editIndex !== -1) {

                users[editIndex] = user;

            }

            // ADD
            else {

                users.push(user);

            }

            localStorage.setItem("users", JSON.stringify(users));

            loadData();

            closeModal();
        }

        // LOAD DATA
        function loadData() {

            let table = document.getElementById("tableBody");

            table.innerHTML = "";

            users.forEach((item, index) => {

                table.innerHTML += `

                <tr>

                    <td>${index + 1}</td>

                    <td>${item.name}</td>

                    <td>${item.email}</td>

                    <td>${item.mobile}</td>

                    <td>

                        <div class="action-btns">

                            <button class="edit-btn" onclick="editData(${index})">
                                Edit
                            </button>

                            <button class="delete-btn" onclick="deleteData(${index})">
                                Delete
                            </button>

                        </div>

                    </td>

                </tr>

                `;
            });

        }

        // DELETE
        function deleteData(index) {

            users.splice(index, 1);

            localStorage.setItem("users", JSON.stringify(users));

            loadData();
        }

        // EDIT
        function editData(index) {

            openModal();

            document.getElementById("name").value = users[index].name;

            document.getElementById("email").value = users[index].email;

            document.getElementById("mobile").value = users[index].mobile;

            editIndex = index;
        }

        // CLEAR FORM
        function clearForm() {

            document.getElementById("name").value = "";

            document.getElementById("email").value = "";

            document.getElementById("mobile").value = "";
        }

        loadData();

    </script>

</body>

</html>
