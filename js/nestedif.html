<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If-else</title>
</head>

<body>

    <script>


        //1) Check if a number is positive, negative, or zero
        var num = parseInt(prompt("Enter a number :"))
        if (num == 0) {
            console.log("num is Zero");
        } else if (num > 0) {
            console.log("num is positive");
        } else {
            console.log("num is negative");
        }

        //2) Find the greatest of three numbers
        const n1 = 5;
        const n2 = 25;
        const n3 = 15;
        if (n1 > n2 && n1 > n3) {
            console.log("N1 is greater");
        } else if (n2 > n1 && n2 > n3) {
            console.log("N2 is greater");
        } else if (n3 > n1 && n3 > n2) {
            console.log("N3 is greater");
        } else {
            console.log("all are equal");
        }

        //3) Grade calculator
        var mark = prompt("Enter ur Mark : ")
        if (mark >= 90) {
            console.log("A grade");
        } else if (mark >= 80) {
            console.log("B grade");
        } else if (mark >= 70) {
            console.log("C grade");
        } else if (mark >= 60) {
            console.log("D grade");
        } else if (mark >= 50) {
            console.log("E grade");
        } else {
            console.log("Fail");
        }

        //4) Check if number is zero, even or odd
        let val = prompt();
        if (val == 0) {
            console.log("number is zero");
        } else if (val != 0 && val % 2 == 0) {
            console.log("number is even");
        } else {
            console.log("number is odd");
        }

        //5) Check Type of Triangle (by sides) ( Equilateral Triangle, Isosceles Triangle, Scalene Triangle)
        let a = 5;
        let b = 5;
        let c = 5;
        if (a + b > c && a + c > b && b + c > a) {

            if (a === b && b === c) {
                console.log("Equilateral Triangle");
            }
            else if (a === b || b === c || a === c) {
                console.log("Isosceles Triangle");
            }
            else {
                console.log("Scalene Triangle");
            }

        } else {
            console.log("Not a valid triangle");
        }

        //6) Simple calculator (using only conditionals)
        let num1 = 10;
        let num2 = 5;
        let operator = "+";
        if (operator === "+") {
            console.log("Addition =", num1 + num2);
        }
        else if (operator === "-") {
            console.log("Subtraction =", num1 - num2);
        }
        else if (operator === "*") {
            console.log("Multiplication =", num1 * num2);
        }
        else if (operator === "/") {

            if (num2 !== 0) {
                console.log("Division =", num1 / num2);
            } else {
                console.log("Cannot divide by zero");
            }
        }
        else {
            console.log("Invalid Operator");
        }

    </script>
</body>

</html>
