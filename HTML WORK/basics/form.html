<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Form</title>
</head>
<body>
    <h1 style="text-align: center;">EXAM APPLICATION FORM</h1>
    <label> Name :</label>
    <input type="text" placeholder="Enter your name "><br><br>
    <label>Age :</label>
    <input type="number" ><span>(Atleast ur age must be 18)</span><br><br>
    <label>Register No :</label>
    <input type="password"><br><br>
    <label> DOB :</label>
    <input type="date"><br><br>
    <label>Gender :</label>
    <input type="radio" name="Gender">Male 
    <input type="radio" name="Gender">Female <br><br>
    <label> Select SEM </label>
    <select>
        <option disabled selected>select ur sem</option>
        <option>Sem 1</option>
        <option>Sem 2</option>
        <option>Sem 3</option>
        <option>Sem 4</option>
        <option>Sem 5</option>
        <option>Sem 6</option>
    </select><br><br>
    
    <label>Select DEPARTMENT:</label>
    <input type="checkbox" checked>CSE
    <input type="checkbox">IT
    <input type="checkbox">ECE
    <input type="checkbox">EEE <br><br>

    <label > Upload ID card</label>
    <input type="file"><br><br>
    <label>Address:</label>
    <textarea  cols="30" rows="10"></textarea><br><br>
    <input type="submit">
    <input type="button" value="close">

</body>
</html>
