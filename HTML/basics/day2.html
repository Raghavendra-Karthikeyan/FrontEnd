<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2 style="text-align: center;">Students Registration Form</h2>

    <label>Name: </label>
    <input type="text" placeholder="Enter your name"> <span>(Max 30 characters long)</span>
    <br><br>

    <label>Password:</label>
    <input type="password"><br><br>

    <label>DOB:</label>
    <input type="date"><br><br>
    
    <label>Month:</label>
    <input type="month"><br><br>

    <label>Mobile</label>
    <input type="number"><br><br>

    <label>Date Time</label>
    <input type="datetime-local"><br><br>

    <label>Gender:</label>
    <input type="radio" name="gender">Male
    <input type="radio" name="gender"> Female<br><br>

    <label> Select Course:</label>
    <select>
        <option disabled selected>Select your course</option>
        <option>HTML</option>
        <option>CSS</option>
        <option>Javascript</option>
        <option>python</option>
    </select><br><br>

    <label>Select department:</label>
    <input type="checkbox">CSE
    <input type="checkbox" checked>IT
    <input type="checkbox">ECE
    <input type="checkbox">EEE <br><br>

    <label>Email:</label>
    <input type="email">

    <label>Upload resume:</label><br><br>
    <input type="file">


      <label>Upload resume:</label><br><br>
    <input type="file" multiple>




    <label>FirstName:</label>
    <input type="text" value="vidhya" readonly><br><br>

    <label>Week:</label>
    <input type="week">


    <label>Address:</label>
    <textarea rows="10" cols="40" ></textarea>

    <input type="button" value="Login">
    <input type="submit">
    <button type="button">Register</button>

    






    <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
